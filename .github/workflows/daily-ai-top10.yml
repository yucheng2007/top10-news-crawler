name: Daily AI Top10 Update

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-top10-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build Top10 outputs
        run: |
          python -m top10_news_crawler.main --top 10 --out outputs
          python scripts/update_readme.py
          python scripts/generate_site.py

      - name: Validate generated files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('outputs/top10.json').read_text(encoding='utf-8'))
          if len(data) != 10:
              raise SystemExit(f'outputs/top10.json must contain 10 items, got {len(data)}')

          required = ['title_en', 'summary', 'source_links', 'representative_link']
          for index, item in enumerate(data, start=1):
              missing = [key for key in required if not item.get(key)]
              if missing:
                  raise SystemExit(f'item #{index} missing required fields: {missing}')

          html = Path('docs/index.html').read_text(encoding='utf-8')
          if '<<<<<<<' in html or '>>>>>>>' in html:
              raise SystemExit('docs/index.html contains unresolved merge conflict markers')
          if '全球 AI 熱搜新聞 Top 10' not in html:
              raise SystemExit('docs/index.html does not contain the expected page title')
          PY

      - name: Commit updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md outputs/top10.json outputs/top10.md docs/index.html
            git commit -m "chore: daily refresh AI top10 digest"
            git push
          else
            echo "No changes to commit"
          fi
